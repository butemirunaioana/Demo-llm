<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titlu %}Demo API{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
        }

        /* ── Bara de navigare ── */
        nav {
            background-color: #2c3e50;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            height: 56px;
        }

        nav .logo {
            color: #ecf0f1;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            margin-right: auto;
        }

        nav a {
            color: #bdc3c7;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            transition: background 0.2s, color 0.2s;
        }

        nav a:hover,
        nav a.activ {
            background-color: #3d5166;
            color: #ecf0f1;
        }

        /* ── Continut principal ── */
        main {
            max-width: 860px;
            margin: 2.5rem auto;
            padding: 0 1.5rem;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
            color: #2c3e50;
        }

        /* ── Card ── */
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 1.8rem;
            margin-bottom: 1.5rem;
        }

        /* ── Tabel ── */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 0.7rem 1rem;
            border-bottom: 1px solid #eee;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f8f9fa;
        }

        /* ── Formular ── */
        .form-grup {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1.2rem;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #555;
        }

        input[type="text"],
        input[type="number"] {
            padding: 0.6rem 0.8rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.2s;
            width: 100%;
        }

        input:focus {
            outline: none;
            border-color: #2c3e50;
        }

        /* ── Butoane ── */
        button {
            padding: 0.65rem 1.6rem;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primar {
            background-color: #2c3e50;
            color: #fff;
        }

        .btn-primar:hover {
            background-color: #3d5166;
        }

        /* ── Mesaje de feedback ── */
        .mesaj {
            padding: 0.9rem 1.2rem;
            border-radius: 5px;
            margin-top: 1rem;
            font-size: 0.95rem;
            display: none;     /* ascuns implicit, JS il afiseaza */
        }

        .mesaj.succes {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .mesaj.eroare {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* ── Badge metoda HTTP ── */
        .badge {
            display: inline-block;
            padding: 0.2rem 0.55rem;
            border-radius: 4px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            vertical-align: middle;
            margin-right: 0.4rem;
        }

        .badge-get  { background-color: #d1ecf1; color: #0c5460; }
        .badge-post { background-color: #d4edda; color: #155724; }
    </style>
</head>
<body>

<nav>
    <a class="logo" href="/">Demo API</a>
    <a href="/"                  {% if pagina == 'acasa'   %}class="activ"{% endif %}>Acasa</a>
    <a href="/pagina/produse"    {% if pagina == 'produse' %}class="activ"{% endif %}>Toate produsele</a>
    <a href="/pagina/cauta"      {% if pagina == 'cauta'   %}class="activ"{% endif %}>Cauta produs</a>
    <a href="/pagina/adauga"     {% if pagina == 'adauga'  %}class="activ"{% endif %}>Adauga produs</a>
</nav>

<main>
    {% block continut %}{% endblock %}
</main>

</body>
</html>
